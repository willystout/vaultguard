# Secrets rotation manifest — used by check_rotation tool
# This defines what secrets exist, when they were last rotated,
# and what the rotation policy requires.

secrets:
  - name: "production-db-password"
    service: "postgres"
    last_rotated: "2024-01-15T00:00:00Z"
    rotation_days: 90
    owner: "platform-team"

  - name: "stripe-api-key"
    service: "stripe"
    last_rotated: "2025-03-01T00:00:00Z"
    rotation_days: 180
    owner: "payments-team"

  - name: "github-deploy-token"
    service: "github"
    last_rotated: "2023-06-01T00:00:00Z"
    rotation_days: 90
    owner: "devops"

  - name: "jwt-signing-key"
    service: "auth"
    last_rotated: "2025-04-01T00:00:00Z"
    rotation_days: 365
    owner: "identity-team"
